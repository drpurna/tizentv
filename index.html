<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tizen TV Ultimate</title>
<meta name="viewport" content="width=1920, height=1080">
<style>
body { margin:0; background:#141414; color:white; font-family:sans-serif; overflow:hidden;}
.hero { height:320px; position:relative; }
.hero video { width:100%; height:100%; object-fit:cover; }
.overlay { position:absolute; bottom:20px; left:30px; font-size:32px; }

.row { margin:20px 30px; }
.row h2 { margin-bottom:10px; }

.row-scroll { display:flex; gap:18px; overflow:hidden; }

.tile { min-width:220px; transition:0.25s; }
.tile img, .tile video { width:100%; border-radius:12px; }
.tile.active { transform:scale(1.25); z-index:10; }

.player { position:fixed; top:0; left:0; width:100%; height:100%; background:black; }
</style>
</head>
<body>
<div id="app"></div>
<script src="app.js"></script>
</body>
</html>
