<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tizen TV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="player"></div>

  <!-- HEADER -->
  <div id="header">
    <div class="logo">Tizen TV</div>
    <div class="actions">
      <div class="icon" id="searchBtn">🔍</div>
      <div class="icon" id="addBtn">➕</div>
    </div>
  </div>

  <!-- UI OVERLAY -->
  <div id="ui">
    <div id="overlay"></div>
    <div id="rows"></div>
  </div>

  <!-- hls.js for browser fallback HLS -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <script src="app.js"></script>
</body>
</html>
