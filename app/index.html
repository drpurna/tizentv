<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART TV</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <!-- Splash screen with YouTube icon and font -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <div class="youtube-icon"></div>
                SMART TV
            </div>
            <div class="splash-tagline">Your favorite channels, reimagined</div>
        </div>
    </div>

    <div id="app">
        <!-- Top bar with logo and actions (no menu button) -->
        <header class="top-bar">
            <div class="logo">📺 SMART TV</div>
            <div class="top-actions">
                <span class="search-icon" data-focusable="true">🔍</span>
                <span class="profile-icon" data-focusable="true">👤</span>
            </div>
        </header>

        <!-- Main content with category rows -->
        <main class="content" id="content">
            <!-- Rows will be injected by JavaScript -->
        </main>

        <!-- Fullscreen video player -->
        <div id="player-container" class="player-container hidden">
            <video id="video-player" class="video-player" autoplay controls></video>
            <button class="close-player" data-action="back" data-focusable="true">✖ Close</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
