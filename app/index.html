<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$mart TV</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <!-- Splash screen -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <div class="youtube-icon"></div>
                $mart TV
            </div>
            <div class="splash-tagline">Your favorite channels, reimagined</div>
        </div>
    </div>

    <div id="app">
        <!-- Top bar with search and YouTube icon -->
        <header class="top-bar">
            <button class="menu-btn" id="menu-toggle" data-focusable="true">☰</button>
            <div class="logo">📺 $mart TV</div>
            <div class="top-actions">
                <span class="search-icon" id="search-button" data-focusable="true">🔍</span>
                <span class="youtube-icon-small" data-focusable="true">
                    <span class="youtube-red"></span>
                </span>
            </div>
        </header>

        <!-- Side panel (hidden by default) -->
        <nav class="side-panel" id="side-panel">
            <div class="panel-header">
                <div class="panel-logo">📺 $mart TV</div>
            </div>
            <ul class="panel-menu">
                <li data-category="all" class="panel-item active" data-focusable="true">
                    <span class="icon">🏠</span>
                    <span class="label">Home</span>
                </li>
                <li data-category="news" class="panel-item" data-focusable="true">
                    <span class="icon">📰</span>
                    <span class="label">News</span>
                </li>
                <li data-category="sports" class="panel-item" data-focusable="true">
                    <span class="icon">⚽</span>
                    <span class="label">Sports</span>
                </li>
                <li data-category="movies" class="panel-item" data-focusable="true">
                    <span class="icon">🎬</span>
                    <span class="label">Movies</span>
                </li>
                <li data-category="entertainment" class="panel-item" data-focusable="true">
                    <span class="icon">🎉</span>
                    <span class="label">Entertainment</span>
                </li>
            </ul>
            <div class="panel-footer">
                <div class="panel-item" data-focusable="true">
                    <span class="icon">⚙️</span>
                    <span class="label">Settings</span>
                </div>
            </div>
        </nav>

        <!-- Search overlay -->
        <div id="search-overlay" class="search-overlay hidden">
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Search channels..." data-focusable="true">
                <button class="search-close" data-action="back" data-focusable="true">✖</button>
            </div>
        </div>

        <!-- Main content with category rows -->
        <main class="content" id="content">
            <!-- Rows injected by JavaScript -->
        </main>

        <!-- Fullscreen video player -->
        <div id="player-container" class="player-container hidden">
            <video id="video-player" class="video-player" autoplay controls></video>
            <button class="close-player" data-action="back" data-focusable="true">✖ Close</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
