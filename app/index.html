<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">

    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-title">IPTV</span>
        <span class="brand-ver">v1.0.2</span>
      </div>

      <div class="row">
        <label class="lbl">PLAYLIST URL</label>
        <input id="playlistUrl" type="text" placeholder="Paste M3U URL..." spellcheck="false" autocomplete="off" />
      </div>
      <div class="row row-btns">
        <button id="loadBtn">&#8635; Load</button>
        <button id="defaultBtn" class="btn-sec">Telugu</button>
      </div>
      <div class="row">
        <label class="lbl">SEARCH</label>
        <input id="searchInput" type="text" placeholder="Filter channels..." spellcheck="false" autocomplete="off" />
      </div>

      <div class="list-head">
        <span class="lbl">CHANNELS</span>
        <span id="countBadge">0</span>
      </div>
      <ul id="channelList"></ul>

      <div class="hint-bar">
        <span>&#8593;&#8595; nav</span>
        <span>&#8629; play</span>
        <span>&#8592;&#8594; focus</span>
        <span>Esc back</span>
        <span>2&#10004; fullscreen</span>
      </div>
    </aside>

    <main class="player-area" id="playerArea">
      <div class="player-header">
        <div class="np-info">
          <h2 id="nowPlaying">No channel selected</h2>
          <span id="nowGroup"></span>
        </div>
        <span id="statusText">Idle</span>
      </div>
      <div class="video-wrap" id="videoWrap">
        <video id="video" autoplay playsinline webkit-playsinline></video>
      </div>
      <div class="help">
        &#9632;Red URL &nbsp;|&nbsp; &#9632;Green Reload &nbsp;|&nbsp; &#9632;Yellow Search &nbsp;|&nbsp; &#9632;Blue Default playlist
      </div>
    </main>

  </div>

  <!-- HLS.js from app directory (local) -->
  <script src="./hls.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
