<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>IPTV</title>
  <link rel="stylesheet" href="./style.css"/>
</head>
<body>
<div class="app" id="app">

  <!-- ── SIDEBAR ─────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="5" width="28" height="18" rx="3" fill="white" fill-opacity="0.15" stroke="white" stroke-width="1.5"/>
          <path d="M13 11L21 16L13 21V11Z" fill="white"/>
          <path d="M7 26 Q16 28 25 26" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <line x1="16" y1="23" x2="16" y2="26" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="brand-title">IPTV</span>
    </div>

    <div class="search-wrap" id="searchWrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Search channels…" spellcheck="false" autocomplete="off"/>
    </div>

    <div class="tab-bar" id="tabBar">
      <button class="tab active" data-idx="0">Telugu</button>
      <button class="tab"        data-idx="1">India</button>
      <button class="tab fav-tab" data-idx="2">★ Favourites</button>
      <button class="tab"        data-idx="3">Jio TV</button>   <!-- new tab -->
    </div>

    <div class="list-head">
      <span class="lbl">CHANNELS</span>
      <span id="countBadge">0</span>
    </div>

    <ul id="channelList"></ul>

    <!-- Number dial overlay -->
    <div class="ch-dialer" id="chDialer">
      <span id="chDialerNum"></span>
    </div>

    <div class="hint-bar">
      <span class="hint-item"><span class="dot red"></span>Playlist</span>
      <span class="hint-item"><span class="dot green"></span>★ Fav</span>
      <span class="hint-item"><span class="dot yellow"></span>Search</span>
      <span class="hint-item"><span class="dot blue"></span>Fullscreen</span>
    </div>

  </aside>

  <!-- ── PLAYER ──────────────────────────────────────── -->
  <main class="player-area" id="playerArea">

    <div class="player-header">
      <div class="np-info">
        <div class="np-ch-num" id="npChNum"></div>
        <h2 id="nowPlaying">Select a channel</h2>
      </div>
      <div class="player-controls">
        <button class="ar-btn" id="arBtn" title="Aspect Ratio">⛶ Fit</button>
        <span id="statusBadge" class="status-badge idle">IDLE</span>
      </div>
    </div>

    <div class="video-wrap" id="videoWrap">
      <video id="video" autoplay playsinline webkit-playsinline></video>
      <div class="video-overlay" id="videoOverlay">
        <div class="overlay-icon">▶</div>
        <p class="overlay-hint">Select a channel to play<br><span>ENTER · fullscreen</span></p>
      </div>
      <div class="fs-hint" id="fsHint">BACK or ← to exit fullscreen</div>
    </div>

    <div class="load-bar" id="loadBar"></div>

  </main>
</div>

<!-- Jio TV Login Modal (hidden by default) -->
<div id="jioModal" class="jio-modal">
  <div class="jio-modal-content">
    <h3>Jio TV Login</h3>
    <div id="jioLoginStep1">
      <input type="tel" id="jioMobile" placeholder="Mobile number (10 digits)" maxlength="10" pattern="\d*">
      <button id="jioRequestOtp">Send OTP</button>
    </div>
    <div id="jioLoginStep2" style="display:none;">
      <input type="text" id="jioOtp" placeholder="OTP" maxlength="6">
      <button id="jioVerifyOtp">Verify</button>
    </div>
    <div id="jioStatus"></div>
    <button id="jioCloseModal">Cancel</button>
  </div>
</div>

<script src="./shaka.js"></script>
<script src="./app.js"></script>
</body>
</html>
