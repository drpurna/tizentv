<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV</title>
  <link rel="stylesheet" href="./style.css" />
  <script>
    // Simple version tracking
    const APP_VERSION = '1.0.2';
    const STORAGE_VERSION_KEY = 'iptv_version';
    const storedVersion = localStorage.getItem(STORAGE_VERSION_KEY);
    const isNewVersion = storedVersion !== APP_VERSION;
    if (isNewVersion) {
      localStorage.setItem(STORAGE_VERSION_KEY, APP_VERSION);
      localStorage.removeItem('iptv_channels');
      localStorage.removeItem('iptv_playlist_url');
      console.log('Cache cleared for new version');
    }
    window.APP_VERSION = APP_VERSION;
    window.IS_NEW_VERSION = isNewVersion;
  </script>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-title">IPTV</span>
        <span class="brand-ver">v<span id="appVersion"></span></span>
      </div>
      <div class="row">
        <label class="lbl">PLAYLIST URL</label>
        <input id="playlistUrl" type="text" placeholder="Paste M3U URL..." spellcheck="false" autocomplete="off" />
      </div>
      <div class="row row-btns">
        <button id="loadBtn">⟳ Load</button>
        <button id="defaultBtn" class="btn-sec">Telugu</button>
      </div>
      <div class="row">
        <label class="lbl">SEARCH</label>
        <input id="searchInput" type="text" placeholder="Filter channels..." spellcheck="false" autocomplete="off" />
      </div>
      <div class="list-head">
        <span class="lbl">CHANNELS</span>
        <span id="countBadge">0</span>
      </div>
      <ul id="channelList"></ul>
      <div class="hint-bar">
        <span>↑↓ nav</span> <span>↵ play</span> <span>←→ focus</span>
        <span>Esc back</span> <span>2✖ fullscreen</span>
      </div>
    </aside>
    <main class="player-area" id="playerArea">
      <div class="player-header">
        <div class="np-info">
          <h2 id="nowPlaying">No channel selected</h2>
          <span id="nowGroup"></span>
        </div>
        <span id="statusText">Idle</span>
      </div>
      <div class="video-wrap" id="videoWrap">
        <video id="video" autoplay playsinline webkit-playsinline></video>
      </div>
      <div class="help">
        ■Red URL &nbsp;|&nbsp; ■Green Reload &nbsp;|&nbsp; ■Yellow Search &nbsp;|&nbsp; ■Blue Default
      </div>
    </main>
  </div>
  <script src="./hls.min.js"></script>
  <script src="./app.js"></script>
  <script>
    document.getElementById('appVersion').textContent = window.APP_VERSION;
  </script>
</body>
</html>
