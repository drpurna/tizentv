<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app" id="app">

    <!-- SIDEBAR: channel list -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-title">IPTV</span>
        <span class="brand-ver">PRO</span>
      </div>

      <!-- Search only (no URL input) -->
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Search channels..." spellcheck="false" autocomplete="off" />
      </div>

      <!-- Playlist tabs -->
      <div class="tab-bar" id="tabBar">
        <button class="tab active" data-idx="0">Telugu</button>
        <button class="tab" data-idx="1">India</button>
        <button class="tab" data-idx="2">Sports</button>
        <button class="tab" data-idx="3">Movies</button>
      </div>

      <div class="list-head">
        <span class="lbl">CHANNELS</span>
        <span id="countBadge">0</span>
      </div>

      <ul id="channelList"></ul>

      <!-- Color button legend -->
      <div class="hint-bar">
        <span class="hint-item"><span class="dot red"></span>Reload</span>
        <span class="hint-item"><span class="dot green"></span>Playlist</span>
        <span class="hint-item"><span class="dot yellow"></span>Search</span>
        <span class="hint-item"><span class="dot blue"></span>Fullscreen</span>
      </div>
    </aside>

    <!-- MAIN: side preview player -->
    <main class="player-area" id="playerArea">
      <div class="player-header">
        <div class="np-info">
          <h2 id="nowPlaying">Select a channel</h2>
          <span id="nowGroup"></span>
        </div>
        <span id="statusBadge" class="status-badge idle">IDLE</span>
      </div>

      <div class="video-wrap" id="videoWrap">
        <video id="video" autoplay playsinline webkit-playsinline></video>
        <div class="video-overlay" id="videoOverlay">
          <div class="overlay-icon">▶</div>
          <p class="overlay-hint">Select a channel to play<br><span>Press ENTER for fullscreen</span></p>
        </div>
        <!-- Fullscreen exit hint (shown only in fullscreen) -->
        <div class="fs-hint" id="fsHint">Press BACK or ← to exit fullscreen</div>
      </div>

      <!-- Loading bar -->
      <div class="load-bar" id="loadBar"></div>
    </main>

  </div>

  <script src="./hls.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
