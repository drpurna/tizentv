<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IPTV Pro</title>

  <meta http-equiv="Content-Security-Policy"
        content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;
                 media-src * blob: data:;
                 connect-src *;
                 font-src * data:;"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="app">

  <div class="sidebar">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
      </div>
      <span class="brand-title">IPTV</span>
    </div>

    <div class="search-wrap" id="searchWrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="searchInput" type="search"
             placeholder="Search channels…"
             autocomplete="off" autocorrect="off" spellcheck="false"/>
    </div>

    <!-- Tabs: Telugu, India, Favs -->
    <div class="tab-bar" id="tabBar">
      <button class="tab active">Telugu</button>
      <button class="tab">India</button>
      <button class="tab fav-tab">★ Favs</button>
    </div>

    <div class="list-head">
      <span class="lbl">Channels</span>
      <span id="countBadge">0</span>
    </div>

    <ul id="channelList"></ul>

    <div class="ch-dialer" id="chDialer">
      <div id="chDialerNum">—</div>
    </div>

    <div class="hint-bar">
      <div class="hint-item"><div class="dot red"></div><span>Tab</span></div>
      <div class="hint-item"><div class="dot green"></div><span>Fav</span></div>
      <div class="hint-item"><div class="dot yellow"></div><span>Search</span></div>
      <div class="hint-item"><div class="dot blue"></div><span>FS</span></div>
    </div>

  </div>

  <div class="player-area">

    <div class="player-header">
      <div class="np-info">
        <div class="np-ch-num" id="npChNum"></div>
        <h2 id="nowPlaying">Select a channel</h2>
      </div>
      <div class="player-controls">
        <button class="ar-btn" id="arBtn">⛶ Fit</button>
        <span class="status-badge idle" id="statusBadge">IDLE</span>
      </div>
    </div>

    <div class="load-bar" id="loadBar"></div>

    <div class="video-wrap" id="videoWrap">
      <video id="video" playsinline autoplay></video>

      <div class="video-overlay" id="videoOverlay">
        <div class="overlay-icon">▶</div>
        <div class="overlay-hint">
          Press <strong>Enter / OK</strong> to play<br/>
          <span>↑↓ browse &nbsp;·&nbsp; RED = tab &nbsp;·&nbsp; BLUE = fullscreen &nbsp;·&nbsp; 0–9 = dial channel</span>
        </div>
      </div>

      <div class="fs-hint" id="fsHint">Press BACK or ENTER to exit fullscreen</div>
    </div>

  </div>

</div>

<script src="shaka.js"></script>
<script src="app.js"></script>

</body>
</html>
