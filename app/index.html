<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>IPTV Pro - Xtream & M3U Player</title>
  
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="brand">
      <h1>IPTV·PRO</h1>
      <div class="clock" id="liveClock">--:--</div>
    </div>
    
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="🔍 Search channels..." autocomplete="off">
    </div>
    
    <div class="tab-bar" id="tabBar"></div>
    
    <div class="list-header">
      <span>📺 CHANNELS</span>
      <div style="display: flex; gap: 12px;">
        <button class="add-playlist-btn" id="addPlaylistBtn">+</button>
        <span id="countBadge">0</span>
      </div>
    </div>
    
    <div id="channelList"></div>
    
    <div class="hint-bar">
      <span>🔴 TAB switch</span>
      <span>🟢 FAV</span>
      <span>🟡 SEARCH</span>
      <span>🔵 FULLSCREEN</span>
      <span>0-9 dial</span>
    </div>
  </div>

  <!-- Player Area -->
  <div class="player-area">
    <div class="player-header">
      <div class="now-playing" id="nowPlaying">Select channel</div>
      <div class="player-controls">
        <button class="ar-btn" id="arBtn">⛶ Fit</button>
        <span class="status" id="statusBadge">● IDLE</span>
      </div>
    </div>
    
    <div class="video-wrap" id="videoWrap">
      <video id="video" playsinline autoplay></video>
      <div class="overlay-bottom">
        <div id="overlayChannelName" style="font-weight: bold; font-size: 1.4rem;"></div>
        <div id="overlayTech" class="channel-tech"></div>
      </div>
    </div>
    
    <div class="channel-dialer" id="channelDialer">
      <div class="dialer-number" id="dialerNum">—</div>
    </div>
  </div>
</div>

<!-- Modals -->
<div id="playlistModal" class="modal">
  <div class="modal-content">
    <h3>Add M3U Playlist</h3>
    <input type="text" id="plName" placeholder="Name (e.g., India)" autocomplete="off">
    <input type="url" id="plUrl" placeholder="M3U URL" autocomplete="off">
    <div class="modal-buttons">
      <button id="savePlBtn">Save</button>
      <button id="cancelPlBtn">Cancel</button>
    </div>
  </div>
</div>

<div id="xtreamModal" class="modal">
  <div class="modal-content">
    <h3>Xtream Codes Login</h3>
    <input type="url" id="xtreamServer" placeholder="Server URL (http://ip:port)" autocomplete="off">
    <input type="text" id="xtreamUser" placeholder="Username" autocomplete="off">
    <input type="password" id="xtreamPass" placeholder="Password" autocomplete="off">
    <div id="xtreamStatus" style="font-size:12px; margin:6px 0;"></div>
    <div class="modal-buttons">
      <button id="xtreamLoginBtn">Login</button>
      <button id="xtreamCancelBtn">Cancel</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- Scripts -->
<script src="shaka.js"></script>
<script src="xtream.js"></script>
<script src="app.js"></script>

</body>
</html>
